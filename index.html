<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Horários de Missa</title>

<style>
body {
  font-family: Arial;
  background: #f8f5f0;
  text-align: center;
  margin: 0;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #8b5a2b;
  padding: 15px 20px;
}

.nome-site {
  color: white;
  font-size: 22px;
  margin: 0;
}

.logo {
  width: 50px;
}

/* CONTEÚDO */
.missa-container {
  padding: 30px;
}

.titulo {
  font-size: 40px;
  color: #8b5a2b;
}

.subtitulo {
  font-size: 20px;
  margin-bottom: 20px;
}

.linha {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #9c6b2f;
  color: white;
  padding: 20px;
  border-radius: 12px;
  width: 220px;
}

.destaque {
  margin: 20px auto;
  background: #9c6b2f;
  color: white;
  padding: 20px;
  border-radius: 12px;
  width: 80%;
}
</style>

</head>
<body>

<!-- TOPO DO SITE TITULO -->
<header class="topo">
  <h1 class="nome-site">Paróquia Nossa Senhora do Livramento</h1>
  <img src="LogoBrasaoDaParoquia.png" class="logo">
</header>

<!-- HORÁRIOS DAS MISSAS NA SEMANA -->
<div class="missa-container">

  <h1 class="titulo">Santa Missa</h1>
  <p class="subtitulo">Semanal</p>

  <div class="linha">
    <div class="card">
      <h3>Terças</h3>
      <p>19h - Matriz do Livramento</p>
    </div>

    <div class="card">
      <h3>Quintas</h3>
      <p>17h - Matriz do Livramento</p>
    </div>
  </div>

  <div class="destaque">
    <h3>1ª Sexta-feira do mês</h3>
    <p>19h - Matriz do Livramento</p>
  </div>

</div>

</body>
</html>
